<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>softblit worker demo</title>
  <style>
    body { background: #16181d; color: #d8dbe2; font: 14px/1.5 ui-monospace, monospace; margin: 24px; }
    h1 { font-size: 16px; font-weight: 600; }
    canvas { border: 1px solid #3a3f4a; display: block; margin: 12px 0; background: #000; }
    #stats { color: #8fd48f; margin-top: 10px; white-space: pre; }
  </style>
</head>
<body>
  <h1>softblit — background rendering: OffscreenCanvas in a dedicated worker</h1>
  <p>The canvas below is transferred to a worker; decode, upload, and present all run off the main thread.</p>
  <canvas id="screen" width="1024" height="640"></canvas>
  <div id="stats">starting…</div>
  <script type="module">
    const canvas = document.getElementById('screen');
    const stats = document.getElementById('stats');
    try {
      const offscreen = canvas.transferControlToOffscreen();
      const worker = new Worker('./demo-worker.js', { type: 'module' });
      worker.onmessage = (e) => { stats.textContent = e.data; };
      worker.onerror = (e) => { stats.textContent = 'worker error: ' + e.message; };
      const animate = !location.search.includes('animate=0');
      worker.postMessage({ canvas: offscreen, animate }, [offscreen]);
    } catch (e) {
      stats.textContent = 'failed to start: ' + e;
      console.error(e);
    }
  </script>
</body>
</html>
